name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.13.2
          
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build with VitePress
        run: pnpm run docs:build

      # --- 新增：打包构建产物 ---
      - name: Compress artifact
        run: |
          # 进入构建目录
          cd .vitepress/dist
          # 将当前目录下的所有文件打包成 artifact.zip (放在项目根目录)
          zip -r ../../artifact.zip .
          # 验证文件是否存在
          ls -lh ../../artifact.zip

      # --- GitHub Pages 部署 ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      # --- mcfpp.top 镜像部署---
      - name: Upload mirror artifact
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          source: .vitepress/dist/
          target: /www/wwwroot/vanillalibrary.mcfpp.top/datapack-index/
          overwrite: true
          strip_components: 2
      - name: Copy index
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          source: .vitepress/dist/index.html
          target: /www/wwwroot/vanillalibrary.mcfpp.top
          overwrite: true
          strip_components: 2
      
      # --- 红石中继站镜像部署 ---
      - name: Get upload policy
        id: policy
        run: |
          FILE_SIZE=$(stat -c%s artifact.zip)
          RESPONSE=$(curl -s -X GET \
            "https://www.mczwlt.net/api/hub/resource/${{ secrets.RESOURCE_ID }}/deploy/upload-policy?contentType=application%2Fzip&filename=artifact.zip&size=$FILE_SIZE" \
            -H "Authorization: Bearer ${{ secrets.BEARER_TOKEN }}")

          echo "Upload policy response: $RESPONSE"

          UPLOAD_URL=$(echo "$RESPONSE" | jq -r .url)
          ATTACHMENT_ID=$(echo "$RESPONSE" | jq -r ._id)
          # Export values as step outputs so later steps can access them
          echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT
          echo "attachment_id=$ATTACHMENT_ID" >> $GITHUB_OUTPUT

      - name: Upload artifact to S3
        run: |
          echo "Uploading artifact to: ${{ steps.policy.outputs.upload_url }}"
          curl -v -X PUT "${{ steps.policy.outputs.upload_url }}" \
            -H "Content-Type: application/zip" \
            --data-binary @artifact.zip

      - name: Trigger deployment
        id: deploy
        run: |
          # pull attachment id from previous step output
          ATTACHMENT_ID="${{ steps.policy.outputs.attachment_id }}"

          RESPONSE=$(curl -s -X POST \
            "https://www.mczwlt.net/api/hub/resource/${{ secrets.RESOURCE_ID }}/deploy" \
            -H "Authorization: Bearer ${{ secrets.BEARER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "attachmentId": "'"$ATTACHMENT_ID"'"
            }')

          DEPLOY_ID=$(echo "$RESPONSE" | jq -r ._id)
          # persist deploy id for subsequent steps
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Poll deployment status
        run: |
          STATUS="CREATED"
          while [ "$STATUS" = "CREATED" ] || [ "$STATUS" = "RUNNING" ]; do
            sleep 5
            RESPONSE=$(curl -s -X GET \
              "https://www.mczwlt.net/api/hub/resource/${{ secrets.RESOURCE_ID }}/deploy/$DEPLOY_ID/status" \
              -H "Authorization: Bearer ${{ secrets.BEARER_TOKEN }}")

            STATUS=$(echo "$RESPONSE" | jq -r .status)
            echo "Deployment status: $STATUS"
          done

          if [ "$STATUS" != "SUCCESS" ]; then
            echo "❌ Deployment failed"
            exit 1
          fi

          echo "✅ Deployment successful"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4