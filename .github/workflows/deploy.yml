name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.13.2
          
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build with VitePress
        run: pnpm run docs:build

      # --- 新增：打包构建产物 ---
      - name: Compress artifact
        run: |
          # 进入构建目录
          cd .vitepress/dist
          # 将当前目录下的所有文件打包成 artifact.zip (放在项目根目录)
          zip -r ../../artifact.zip .
          # 验证文件是否存在
          ls -lh ../../artifact.zip

      # --- 原有的 GitHub Pages 上传 ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      # --- 原有的 SFTP 备份 (保持不变) ---
      - name: Upload mirror artifact
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          source: .vitepress/dist/
          target: /www/wwwroot/vanillalibrary.mcfpp.top/datapack-index/
          overwrite: true
          strip_components: 2
      - name: Copy index
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          source: .vitepress/dist/index.html
          target: /www/wwwroot/vanillalibrary.mcfpp.top
          overwrite: true
          strip_components: 2
      
      # --- 修正后的第三方部署逻辑 ---
      - name: Get upload policy
        id: policy
        run: |
          # 现在 artifact.zip 已经存在于根目录了
          FILE_SIZE=$(stat -c%s artifact.zip)
          echo "📦 File size: $FILE_SIZE"

          RESPONSE=$(curl -s -X GET \
            "https://www.mczwlt.net/api/hub/resource/${{ secrets.RESOURCE_ID }}/deploy/upload-policy?contentType=application%2Fzip&filename=artifact.zip&size=$FILE_SIZE" \
            -H "Authorization: Bearer ${{ secrets.BEARER_TOKEN }}")

          # 检查是否获取成功
          if echo "$RESPONSE" | jq -e '.url' > /dev/null; then
            echo "UPLOAD_URL=$(echo "$RESPONSE" | jq -r .url)" >> $GITHUB_ENV
            echo "ATTACHMENT_ID=$(echo "$RESPONSE" | jq -r ._id)" >> $GITHUB_ENV
          else
            echo "❌ 获取上传策略失败: $RESPONSE"
            exit 1
          fi

      - name: Upload artifact to S3
        run: |
          echo "🚀 开始上传到 S3..."
          # 确保这里上传的是刚才生成的 zip 包
          curl -X PUT "$UPLOAD_URL" \
            -H "Content-Type: application/zip" \
            --data-binary @artifact.zip
          echo "✅ 上传完成"

      - name: Trigger deployment
        id: deploy
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://www.mczwlt.net/api/hub/resource/${{ secrets.RESOURCE_ID }}/deploy" \
            -H "Authorization: Bearer ${{ secrets.BEARER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Cookie: repeater-red.sid=s%3AdE-DOpSYd5mX3VI04-LNzuelrIUK3H-X.ilRfuO2wguGew%2FhMHMntWZmCLEvYvKOvtoNcbNCvtk0; sl-session=Vnk4IzVF12mJih4yHXqfig==; repeater-red-token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1aWQiOiI2NzljZDBiMmNlYzlhMDE5ZWVmNGRlYjAiLCJ1c2VybmFtZSI6IkNSXzAxOSIsImVtYWlsIjoieWFud2VuY2hhbzAxOUB5ZWFoLm5ldCIsInByZUxvZ2luIjpmYWxzZSwib3RwIjoic2tpcCIsImlzQWRtaW4iOmZhbHNlLCJpc0Jhbm5lZCI6ZmFsc2UsImlhdCI6MTc3NTYyOTgzMCwiZXhwIjoxNzc4MjIxODMwLCJqdGkiOiI2OWQ1ZjYwNjQ2ZmU0MTQxNjE4MGJhYjgifQ.VLKYu4BNraUETo8M0qI3YyHj-ORS8nPk8tfPkgX-d1o"\
            -d '{
              "attachmentId": "'"$ATTACHMENT_ID"'"
            }')

          echo "DEPLOY_ID=$(echo "$RESPONSE" | jq -r ._id)" >> $GITHUB_ENV

      - name: Poll deployment status
        run: |
          STATUS="CREATED"
          while [ "$STATUS" = "CREATED" ] || [ "$STATUS" = "RUNNING" ]; do
            sleep 5
            RESPONSE=$(curl -s -X GET \
              "https://www.mczwlt.net/api/hub/resource/${{ secrets.RESOURCE_ID }}/deploy/$DEPLOY_ID/status" \
              -H "Authorization: Bearer ${{ secrets.BEARER_TOKEN }}")

            STATUS=$(echo "$RESPONSE" | jq -r .status)
            echo "Deployment status: $STATUS"
          done

          if [ "$STATUS" != "SUCCESS" ]; then
            echo "❌ Deployment failed"
            exit 1
          fi

          echo "✅ Deployment successful"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4