name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.13.2
          
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build with VitePress
        run: pnpm run docs:build

      # --- 新增：打包构建产物 ---
      - name: Compress artifact
        run: |
          # 进入构建目录
          cd .vitepress/dist
          # 将当前目录下的所有文件打包成 artifact.zip (放在项目根目录)
          zip -r ../../artifact.zip .
          # 验证文件是否存在
          ls -lh ../../artifact.zip

      # --- 原有的 GitHub Pages 上传 ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      # --- 原有的 SFTP 备份 (保持不变) ---
      - name: Upload mirror artifact
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          source: .vitepress/dist/
          target: /www/wwwroot/vanillalibrary.mcfpp.top/datapack-index/
          overwrite: true
          strip_components: 2
      - name: Copy index
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          source: .vitepress/dist/index.html
          target: /www/wwwroot/vanillalibrary.mcfpp.top
          overwrite: true
          strip_components: 2
      
      # --- 第三方部署 ---
      - name: Deploy to Server
        uses: redstone-ore/actions-docs-deploy@v1.0.3
        with:
          file: 构建打包后的文件地址
          resource_id: ${{ secrets.RESOURCE_ID }}
          bearer_token: ${{ secrets.BEARER_TOKEN }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4